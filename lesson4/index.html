<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Форма</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <form>
      <fieldset>
        <legend>Ваши личные данные</legend>
        <label
          >Ваше имя<input
            type="text"
            name="name"
            placeholder="Артур Пирожков"
            required
        /></label>
        <label
          >Возраст<input
            type="number"
            inputmode="numeric"
            name="num"
            placeholder="35"
            required
        /></label>
        <label
          >Телефон<input
            type="tel"
            inputmode="tel"
            name="tel"
            placeholder="88005553535"
            required
        /></label>
        <label
          >Ваша почта<input
            type="email"
            inputmode="email"
            name="email"
            placeholder="test@gmail.com"
            required
        /></label>
      </fieldset>
      <fieldset>
        <label>Сообщение<textarea name="comment"></textarea></label>

        <label
          ><input
            class="pointer"
            type="checkbox"
            name="check"
            id="check"
            required
          />Я принимаю</label
        >
        <button type="submit" class="pointer">Отправить</button>
      </fieldset>
    </form>
  </body>
</html>
